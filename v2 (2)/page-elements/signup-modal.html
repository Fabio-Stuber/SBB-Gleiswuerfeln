<div id="signupModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-md">

    <div class="w-full h-122 max-w-md shadow-md bg-white dark:bg-gray-800 rounded-xl p-8 space-y-4 relative">
        <button id="closeSignupBtn" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 dark:hover:text-white cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>

        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 uppercase text-center">Create an Account</h2>

        <form id="signupForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-red-600 dark:text-white mb-1">Firstname</label>
                    <input type="text" id="signupVorname" required class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-red-600 dark:text-white mb-1">Lastname</label>
                    <input type="text" id="signupNachname" required class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-red-600 dark:text-white mb-1">Email address</label>
                <input type="email" id="signupEmail" required class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />
            </div>

            <div>
                <label data-key="account.edit.password" class="block text-sm font-medium text-red-600 dark:text-white mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="signupPassword" required class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />

                    <button type="button" onclick="togglePasswordVisibility('signupPassword', 'signupPasswordToggleText')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-600 dark:text-gray-300 cursor-pointer">
                        <span id="signupPasswordToggleText">Show</span>
                    </button>
                </div>
                <p data-key="account.edit.passwordinfo" class="text-xs text-gray-900 dark:text-white text-pretty">At least 12 characters, including uppercase and lowercase letters, numbers, and special characters</p>
            </div>

            <button type="submit" class="w-full text-center bg-red-600 hover:bg-red-700 text-white rounded-sm px-5 py-2.5 text-sm font-medium transition">
                Sign up
            </button>
        </form>

        <p class="text-sm text-center text-gray-900 dark:text-white text-pretty mt-4">
            Already have an account? <button id="switchToLogin" class="text-red-600 hover:underline cursor-pointer">Log in here</button>
        </p>
    </div>

</div>
